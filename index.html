<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FLUX // GLOBAL</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; margin: 0; height: 100vh; overflow: hidden; }
        
        #auth { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .logo { font-size: 50px; font-weight: 900; color: #0044ff; margin-bottom: 30px; letter-spacing: 5px; text-shadow: 0 0 20px rgba(0,68,255,0.4); }
        input { background: #0a0a0a; border: 1px solid #1a1a40; border-radius: 16px; padding: 20px; color: #fff; width: 85%; max-width: 320px; text-align: center; font-size: 18px; margin-bottom: 20px; }
        .btn { background: #0044ff; color: #fff; border: none; border-radius: 16px; padding: 18px; width: 85%; max-width: 320px; font-weight: bold; }

        #app { display: none; flex-direction: column; height: 100vh; }
        header { padding: 55px 20px 15px; background: rgba(5,5,20,0.9); border-bottom: 1px solid #111; backdrop-filter: blur(20px); }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: radial-gradient(circle at top, #050514 0%, #000 100%); }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 15px; animation: slide 0.2s ease; }
        @keyframes slide { from { opacity: 0; transform: translateY(10px); } }
        .s { align-self: flex-end; background: #0044ff; }
        .r { align-self: flex-start; background: #1c1c1c; border: 1px solid #222; }
        .u { font-size: 10px; opacity: 0.5; margin-bottom: 4px; display: block; }

        footer { padding: 10px 15px 35px; background: #050505; border-top: 1px solid #111; display: flex; gap: 10px; }
        footer input { flex: 1; margin: 0; text-align: left; background: #111; border-radius: 25px; border: none; }
    </style>
</head>
<body>

    <div id="auth">
        <div class="logo">FLUX</div>
        <input type="text" id="nick" placeholder="@username">
        <button class="btn" onclick="start()">ВОЙТИ</button>
    </div>

    <div id="app">
        <header><b id="my-nick">@user</b></header>
        <div id="chat"></div>
        <footer>
            <input type="text" id="msg-input" placeholder="Сообщение..." autocomplete="off">
            <button onclick="send()" style="background:none; border:none; color:#0044ff; font-size:26px;">➔</button>
        </footer>
    </div>

<script>
    const S_URL = 'https://snpwdrbjvemwgfwsgbcc.supabase.co';
    const S_KEY = 'sb_publishable_uACroMlD34-JBnBPqk8wIw_O-vC_S3y'; // ТВОЙ КОД ТУТ
    const supabase = lib.supabase.createClient(S_URL, S_KEY);

    let myNick = "";

    async function start() {
        myNick = document.getElementById('nick').value;
        if(!myNick.startsWith('@')) return alert("Ник с @!");
        document.getElementById('auth').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        document.getElementById('my-nick').innerText = myNick;

        load();
        supabase.channel('messages').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, p => {
            if(p.new.username !== myNick) render(p.new);
        }).subscribe();
    }

    async function send() {
        const i = document.getElementById('msg-input');
        if(!i.value.trim()) return;
        await supabase.from('messages').insert([{ text: i.value, username: myNick }]);
        render({ text: i.value, username: myNick });
        i.value = "";
    }

    async function load() {
        const { data } = await supabase.from('messages').select('*').order('id', { ascending: true });
        if(data) data.forEach(m => render(m));
    }

    function render(m) {
        const b = document.getElementById('chat');
        const d = document.createElement('div');
        d.className = `msg ${m.username === myNick ? 's' : 'r'}`;
        d.innerHTML = `<span class="u">${m.username}</span>${m.text}`;
        b.appendChild(d);
        b.scrollTop = b.scrollHeight;
    }
</script>
</body>
</html>
