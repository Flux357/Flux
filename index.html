<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FLUX // OS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #007AFF; --bg: #000; --panel: #121212; --text: #fff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; height: 100vh; overflow: hidden; }

        /* ЭКРАН ВХОДА */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; transition: 0.5s; }
        .auth-card { width: 85%; max-width: 350px; text-align: center; }
        .logo-box { font-size: 40px; font-weight: 900; margin-bottom: 40px; letter-spacing: -1px; }
        .logo-box span { color: var(--blue); }
        h2 { font-size: 22px; margin-bottom: 10px; }
        p { opacity: 0.5; font-size: 14px; margin-bottom: 30px; }
        
        input { background: var(--panel); border: 1px solid #222; border-radius: 12px; padding: 16px; color: #fff; width: 100%; font-size: 16px; margin-bottom: 15px; transition: 0.3s; }
        input:focus { border-color: var(--blue); box-shadow: 0 0 10px rgba(0,122,255,0.2); }
        .btn { background: var(--blue); color: #fff; border: none; border-radius: 12px; padding: 16px; width: 100%; font-weight: 600; font-size: 16px; cursor: pointer; }
        
        #code-step { display: none; }

        /* ГЛАВНОЕ МЕНЮ (КАК ТГ) */
        #main-menu { display: none; flex-direction: column; height: 100vh; background: var(--bg); }
        header { padding: 50px 15px 10px; background: var(--panel); border-bottom: 1px solid #222; }
        .search-bar { background: #222; border-radius: 10px; padding: 8px 15px; display: flex; align-items: center; }
        .search-bar input { background: transparent; border: none; margin: 0; padding: 5px; font-size: 14px; text-align: left; }

        .chats-list { flex: 1; overflow-y: auto; }
        .chat-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #111; cursor: pointer; }
        .avatar { width: 50px; height: 50px; background: linear-gradient(45deg, #0044ff, #00c6ff); border-radius: 50%; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .chat-info { flex: 1; }
        .chat-name { font-weight: 600; margin-bottom: 4px; display: flex; justify-content: space-between; }
        .chat-name span { font-weight: 400; font-size: 12px; opacity: 0.4; }
        .chat-last { font-size: 13px; opacity: 0.5; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }

        /* ОКНО ЧАТА */
        #chat-window { display: none; flex-direction: column; height: 100vh; position: fixed; inset: 0; background: var(--bg); z-index: 500; }
        .chat-header { padding: 45px 15px 15px; background: var(--panel); display: flex; align-items: center; border-bottom: 1px solid #222; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .m { max-width: 80%; padding: 10px 14px; border-radius: 15px; font-size: 15px; line-height: 1.4; }
        .sent { align-self: flex-end; background: var(--blue); }
        .rec { align-self: flex-start; background: #262626; }
        
        .input-area { padding: 10px 15px 30px; background: var(--panel); display: flex; gap: 10px; align-items: center; }
        .input-area input { margin: 0; border-radius: 20px; background: #222; padding: 10px 18px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card" id="phone-step">
            <div class="logo-box">FLUX<span>.</span></div>
            <h2>Ваш телефон</h2>
            <p>Введите номер телефона для входа.</p>
            <input type="tel" id="phone" placeholder="+7 999 000 00 00">
            <button class="btn" onclick="nextStep()">Далее</button>
        </div>

        <div class="auth-card" id="code-step">
            <div class="logo-box">FLUX<span>.</span></div>
            <h2 id="display-phone"></h2>
            <p>Мы отправили код на ваш номер.</p>
            <input type="number" id="sms-code" placeholder="Код (любой)">
            <button class="btn" onclick="login()">Подтвердить</button>
        </div>
    </div>

    <div id="main-menu">
        <header>
            <div class="search-bar">
                <input type="text" placeholder="Поиск юзернейма...">
            </div>
        </header>
        <div class="chats-list">
            <div class="chat-item" onclick="openChat('GLOBAL CLOUD', 'GC')">
                <div class="avatar">GC</div>
                <div class="chat-info">
                    <div class="chat-name">GLOBAL CLOUD <span>21:40</span></div>
                    <div class="chat-last">Добро пожаловать во Flux Global!</div>
                </div>
            </div>
        </div>
    </div>

    <div id="chat-window">
        <div class="chat-header">
            <button onclick="closeChat()" style="background:none; border:none; color:var(--blue); font-size:20px; margin-right:15px;">❮</button>
            <b id="chat-title">Чат</b>
        </div>
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="msg-input" placeholder="Сообщение...">
            <button onclick="send()" style="background:none; border:none; color:var(--blue); font-size:24px;">➔</button>
        </div>
    </div>

<script>
    const S_URL = 'https://snpwdrbjvemwgfwsgbcc.supabase.co';
    const S_KEY = 'sb_publishable_uACroMlD34-JBnBPqk8wIw_O-vC_S3y';
    const supabase = lib.supabase.createClient(S_URL, S_KEY);

    let userPhone = "";

    function nextStep() {
        userPhone = document.getElementById('phone').value;
        if(userPhone.length < 10) return alert("Введите номер!");
        document.getElementById('phone-step').style.display = 'none';
        document.getElementById('code-step').style.display = 'block';
        document.getElementById('display-phone').innerText = userPhone;
    }

    function login() {
        document.getElementById('auth-screen').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-menu').style.display = 'flex';
        }, 500);
    }

    function openChat(name, short) {
        document.getElementById('chat-window').style.display = 'flex';
        document.getElementById('chat-title').innerText = name;
        load();
    }

    function closeChat() {
        document.getElementById('chat-window').style.display = 'none';
    }

    async function send() {
        const i = document.getElementById('msg-input');
        if(!i.value.trim()) return;
        await supabase.from('messages').insert([{ text: i.value, username: userPhone }]);
        render({ text: i.value, username: userPhone });
        i.value = "";
    }

    async function load() {
        const { data } = await supabase.from('messages').select('*').order('id', { ascending: true });
        document.getElementById('messages').innerHTML = "";
        if(data) data.forEach(m => render(m));
    }

    function render(m) {
        const b = document.getElementById('messages');
        const d = document.createElement('div');
        d.className = `m ${m.username === userPhone ? 'sent' : 'rec'}`;
        d.innerText = m.text;
        b.appendChild(d);
        b.scrollTop = b.scrollHeight;
    }

    // Realtime
    supabase.channel('messages').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, p => {
        if(p.new.username !== userPhone) render(p.new);
    }).subscribe();
</script>
</body>
</html>
