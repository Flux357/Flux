<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telegram // Flux</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #0088cc; --bg: #000; --panel: #1c1c1d; --text: #ffffff; --gray: #8e8e93; }
        * { box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); margin: 0; height: 100vh; overflow: hidden; }

        /* ЭКРАН ВХОДА */
        #auth { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; transition: 0.4s; }
        .tg-logo { width: 100px; height: 100px; background: var(--blue); border-radius: 50%; margin-bottom: 30px; display: flex; align-items: center; justify-content: center; font-size: 50px; }
        .auth-box { width: 100%; max-width: 320px; text-align: center; }
        h1 { font-size: 24px; margin-bottom: 10px; }
        p { color: var(--gray); font-size: 14px; margin-bottom: 30px; }
        input { width: 100%; background: var(--panel); border: none; padding: 16px; border-radius: 12px; color: #fff; font-size: 18px; margin-bottom: 15px; text-align: center; }
        .btn { width: 100%; background: var(--blue); color: #fff; border: none; padding: 16px; border-radius: 12px; font-weight: 600; font-size: 16px; cursor: pointer; }

        /* ГЛАВНЫЙ ЭКРАН (ТГ СТАЙЛ) */
        #app { display: none; flex-direction: column; height: 100vh; }
        header { padding: 50px 15px 10px; background: #000; }
        .search-container { background: #1c1c1d; border-radius: 10px; display: flex; align-items: center; padding: 8px 12px; margin-bottom: 10px; }
        .search-container input { background: transparent; padding: 0; margin: 0; font-size: 15px; text-align: left; }
        
        .chats { flex: 1; overflow-y: auto; }
        .chat-item { display: flex; padding: 12px 15px; align-items: center; gap: 15px; border-bottom: 0.5px solid #222; }
        .avatar { width: 54px; height: 54px; border-radius: 50%; background: linear-gradient(45deg, #2af598 0%, #009efd 100%); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; }
        .chat-content { flex: 1; }
        .chat-top { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .chat-name { font-weight: 600; font-size: 16px; }
        .chat-time { color: var(--gray); font-size: 13px; }
        .chat-msg { color: var(--gray); font-size: 14px; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }

        /* НИЖНЕЕ МЕНЮ */
        nav { display: flex; background: #121212; border-top: 0.5px solid #222; padding: 8px 0 25px; justify-content: space-around; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--gray); font-size: 10px; gap: 4px; }
        .nav-item.active { color: var(--blue); }
        .nav-icon { font-size: 22px; }

        /* ОКНО ЧАТА */
        #chat-view { display: none; position: fixed; inset: 0; background: #0e1621; z-index: 500; flex-direction: column; }
        .chat-header { padding: 45px 15px 10px; background: #17212b; display: flex; align-items: center; gap: 15px; }
        #msg-list { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-size: cover; }
        .bubble { max-width: 80%; padding: 8px 12px; border-radius: 12px; font-size: 15px; position: relative; }
        .my-msg { align-self: flex-end; background: #2b5278; }
        .his-msg { align-self: flex-start; background: #182533; }
        .msg-time { font-size: 10px; opacity: 0.5; float: right; margin: 5px 0 0 8px; }

        .input-bar { padding: 10px 15px 30px; background: #17212b; display: flex; align-items: center; gap: 10px; }
        .input-bar input { margin: 0; text-align: left; background: transparent; }
    </style>
</head>
<body>

    <div id="auth">
        <div class="auth-box" id="s1">
            <div class="tg-logo">✈️</div>
            <h1>FLUX Messenger</h1>
            <p>Введите ваш номер телефона.</p>
            <input type="tel" id="phone" placeholder="+7 999 000-00-00">
            <button class="btn" onclick="toStep2()">Продолжить</button>
        </div>
        <div class="auth-box" id="s2" style="display:none">
            <div class="tg-logo">🔒</div>
            <h1 id="ph-title"></h1>
            <p>Мы отправили проверочный код.</p>
            <input type="number" id="code" placeholder="00000">
            <button class="btn" onclick="finishAuth()">Войти</button>
        </div>
    </div>

    <div id="app">
        <header>
            <div class="search-container">
                <input type="text" placeholder="Поиск сообщений или людей">
            </div>
        </header>
        <div class="chats">
            <div class="chat-item" onclick="openChat('FLUX Global', 'FG')">
                <div class="avatar" style="background: linear-gradient(45deg, #ff9a9e, #fad0c4);">FG</div>
                <div class="chat-content">
                    <div class="chat-top"><span class="chat-name">FLUX Global Chat</span><span class="chat-time">12:45</span></div>
                    <div class="chat-msg">Добро пожаловать в новый мессенджер!</div>
                </div>
            </div>
        </div>
        <nav>
            <div class="nav-item"><span class="nav-icon">👤</span>Контакты</div>
            <div class="nav-item active"><span class="nav-icon">💬</span>Чаты</div>
            <div class="nav-item"><span class="nav-icon">⚙️</span>Настройки</div>
        </nav>
    </div>

    <div id="chat-view">
        <div class="chat-header">
            <span onclick="closeChat()" style="color: var(--blue); font-size: 24px;">❮</span>
            <div class="avatar" id="header-ava" style="width:35px; height:35px; font-size:12px;"></div>
            <b id="header-name">Чат</b>
        </div>
        <div id="msg-list"></div>
        <div class="input-bar">
            <input type="text" id="m-input" placeholder="Сообщение">
            <span onclick="sendMsg()" style="color: var(--blue); font-size: 24px;">➔</span>
        </div>
    </div>

<script>
    // ВСТАВЬ СВОИ ДАННЫЕ ИЗ SUPABASE НИЖЕ
    const S_URL = 'https://snpwdrbjvemwgfwsgbcc.supabase.co'; 
    const S_KEY = 'sb_publishable_uACroMlD34-JBnBPqk8wIw_O-vC_S3y';
    const supabase = lib.supabase.createClient(S_URL, S_KEY);

    let myPhone = "";

    function toStep2() {
        myPhone = document.getElementById('phone').value;
        if(!myPhone) return;
        document.getElementById('s1').style.display='none';
        document.getElementById('s2').style.display='block';
        document.getElementById('ph-title').innerText = myPhone;
    }

    function finishAuth() {
        document.getElementById('auth').style.opacity='0';
        setTimeout(() => {
            document.getElementById('auth').style.display='none';
            document.getElementById('app').style.display='flex';
        }, 400);
    }

    function openChat(name, ava) {
        document.getElementById('chat-view').style.display='flex';
        document.getElementById('header-name').innerText = name;
        document.getElementById('header-ava').innerText = ava;
        loadMsgs();
    }

    function closeChat() { document.getElementById('chat-view').style.display='none'; }

    async function sendMsg() {
        const inp = document.getElementById('m-input');
        if(!inp.value.trim()) return;
        await supabase.from('messages').insert([{ text: inp.value, username: myPhone }]);
        addBubble({ text: inp.value, username: myPhone });
        inp.value = "";
    }

    async function loadMsgs() {
        const { data } = await supabase.from('messages').select('*').order('id', { ascending: true });
        document.getElementById('msg-list').innerHTML = "";
        if(data) data.forEach(m => addBubble(m));
    }

    function addBubble(m) {
        const list = document.getElementById('msg-list');
        const div = document.createElement('div');
        div.className = `bubble ${m.username === myPhone ? 'my-msg' : 'his-msg'}`;
        div.innerHTML = `${m.text} <span class="msg-time">21:55</span>`;
        list.appendChild(div);
        list.scrollTop = list.scrollHeight;
    }

    supabase.channel('messages').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, p => {
        if(p.new.username !== myPhone) addBubble(p.new);
    }).subscribe();
</script>
</body>
</html>
